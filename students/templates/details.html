{% extends "master.html" %}

{% block title %}
  Details about {{ student.name}}
{%endblock%}
{% block content %}
  <div class="mycard">
    <h1>{{ student.name }}</h1>
    <img src="{{ student.image.url }}" width="200">
    <p>Roll_no: {{ student.roll_no }}</p>
    <p>email: {{ student.email }}</p>
    <p>course: {{ student.course }}</p>
    <p></p>
  </div>
  
{% endblock %}
