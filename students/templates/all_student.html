{% extends "master.html" %}

{% block title %}
  Student Detail
{% endblock %}

{% block content %}
  <div class="mycard">
    <h1>Students</h1>
    <ul>
      {% for x in students %}
        <li onclick="window.location='details/{{ x.id }}'">
          {{ x.name }}
        </li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
